<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Karem AlMoayyad — Karemops.ai</title>
<meta name="description" content="Free guides on building with Claude Code, running AI ad systems, and shipping content faster." />

<meta property="og:description" content="Free guides on building with Claude Code, running AI ad systems, and shipping content faster." />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #000000;
    --bg-soft: #050B1F;
    --text: #FFFFFF;
    --text-muted: #A8B0C2;
    --brand-blue: #0866FF;
    --stroke: rgba(59, 130, 246, 0.6);
    --panel: rgba(255, 255, 255, 0.02);
    --panel-border: rgba(255, 255, 255, 0.06);
    --panel-hover: rgba(255, 255, 255, 0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
  }

  body {
    background:
      radial-gradient(circle at 50% 0%, rgba(8, 102, 255, 0.08) 0%, transparent 40%),
      var(--bg);
    padding: 48px 20px 64px;
  }

  .container {
    max-width: 620px;
    margin: 0 auto;
  }

  /* ---------- HERO ---------- */
  .hero {
    text-align: center;
    padding-top: 24px;
  }

  .avatar-wrap {
    display: inline-block;
    position: relative;
    margin-bottom: 28px;
  }

  .avatar-glow {
    position: absolute;
    inset: -20px;
    background: radial-gradient(circle, rgba(8, 102, 255, 0.55) 0%, rgba(8, 102, 255, 0) 65%);
    filter: blur(6px);
    z-index: 0;
    border-radius: 50%;
  }

  .avatar {
    position: relative;
    width: 148px;
    height: 148px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0866FF 0%, #050B1F 100%);
    border: 2px solid rgba(8, 102, 255, 0.7);
    overflow: hidden;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 44px;
    color: #fff;
    letter-spacing: -0.02em;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  h1 {
    font-weight: 900;
    font-size: 28px;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }

  .handle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  .bio {
    max-width: 440px;
    margin: 0 auto 24px;
    color: var(--text-muted);
    font-size: 15px;
    line-height: 1.55;
  }

  .socials {
    display: flex;
    justify-content: center;
    gap: 22px;
    margin-bottom: 40px;
  }

  .socials a {
    color: var(--text-muted);
    transition: color 0.15s ease;
    display: inline-flex;
  }

  .socials a:hover { color: var(--text); }

  .socials svg { width: 22px; height: 22px; }

  /* ---------- CARDS ---------- */
  .card {
    display: block;
    text-decoration: none;
    color: inherit;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 20px 22px;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    position: relative;
  }

  .card:hover {
    background: var(--panel-hover);
    border-color: rgba(255, 255, 255, 0.12);
  }

  /* Featured Skool card */
  .card-featured {
    border: 1.5px solid var(--stroke);
    background:
      linear-gradient(180deg, rgba(8, 102, 255, 0.06) 0%, rgba(8, 102, 255, 0.02) 100%);
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .card-featured:hover {
    border-color: var(--brand-blue);
    background:
      linear-gradient(180deg, rgba(8, 102, 255, 0.1) 0%, rgba(8, 102, 255, 0.04) 100%);
  }

  .card-featured .icon {
    flex: 0 0 44px;
    height: 44px;
    background: var(--brand-blue);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }

  .card-featured .body { flex: 1; min-width: 0; }

  .card-featured .tag-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .badge-blue {
    display: inline-block;
    background: rgba(8, 102, 255, 0.18);
    color: var(--brand-blue);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 4px;
  }

  .label-mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .card-featured h3 {
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 4px;
    line-height: 1.35;
  }

  .card-featured .sub {
    font-size: 13px;
    color: var(--text-muted);
  }

  .arrow-out {
    flex: 0 0 auto;
    color: var(--text-muted);
  }

  /* Section header */
  .section-header {
    text-align: center;
    margin: 40px 0 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    position: relative;
  }

  .section-header::before,
  .section-header::after {
    content: "";
    position: absolute;
    top: 50%;
    width: calc(50% - 90px);
    height: 1px;
    background: var(--panel-border);
  }

  .section-header::before { left: 0; }
  .section-header::after  { right: 0; }

  /* Guide list */
  .guides {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .guide-card {
    display: flex;
    gap: 16px;
    align-items: stretch;
  }

  .guide-thumb {
    flex: 0 0 96px;
    height: 96px;
    border-radius: 10px;
    background: linear-gradient(135deg, #0A1633 0%, #050B1F 100%);
    border: 1px solid var(--panel-border);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .guide-thumb .thumb-glyph {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.4);
    text-align: center;
    padding: 8px;
    line-height: 1.3;
  }

  .guide-thumb::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(8, 102, 255, 0.2) 0%, transparent 60%);
    pointer-events: none;
  }

  .guide-body { flex: 1; min-width: 0; }

  .guide-title-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }

  .guide-title {
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
  }

  .guide-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .guide-cta {
    font-size: 13px;
    color: var(--brand-blue);
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  /* Show all button */
  .show-all {
    display: block;
    width: 100%;
    text-align: center;
    text-decoration: none;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 14px;
    font-size: 14px;
    font-weight: 500;
    margin-top: 18px;
    transition: background 0.15s ease, border-color 0.15s ease;
    cursor: pointer;
  }

  .show-all:hover {
    background: var(--panel-hover);
    border-color: rgba(255, 255, 255, 0.12);
  }

  .fine-print {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 16px;
    letter-spacing: 0.03em;
  }

  /* Email capture (hidden by default, shown on guide click) */
  .capture-panel {
    margin-top: 28px;
    padding: 22px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    display: none;
  }

  .capture-panel.open { display: block; }

  .capture-panel label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .capture-panel .row {
    display: flex;
    gap: 8px;
  }

  .capture-panel input[type="email"] {
    flex: 1;
    background: #000;
    color: var(--text);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s ease;
  }

  .capture-panel input[type="email"]:focus {
    border-color: var(--brand-blue);
  }

  .capture-panel button {
    background: var(--brand-blue);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0 20px;
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }

  .capture-panel button:hover { opacity: 0.9; }

  .capture-panel .privacy {
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-muted);
  }

  /* Footer */
  footer {
    margin-top: 56px;
    text-align: center;
  }

  .footer-divider {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .footer-handle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--brand-blue);
    font-weight: 700;
    letter-spacing: 0.08em;
  }

  @media (max-width: 480px) {
    body { padding: 32px 16px 48px; }
    h1 { font-size: 24px; }
    .avatar { width: 128px; height: 128px; }
    .guide-thumb { flex: 0 0 80px; height: 80px; }
    .card-featured { padding: 16px; gap: 12px; }
  }
</style>
</head>

    },
    {
      title: "Anthropic Courses Guide",
      desc: "The roadmap through Anthropic's free courses — what to skip, what to master, in what order.",
      thumb: "Courses\nRoadmap",
      href: "lead-magnets/anthropic-courses-guide.html"
    },
    {
      title: "Routines: Automate Your Day",
      desc: "The Claude Code /routines setup that runs my mornings — email, news, priorities, on autopilot.",
      thumb: "Routines",
      href: "lead-magnets/routines-guide.html"
    }
  ];

  const INITIAL_COUNT = 2;
  const list = document.getElementById('guides-list');
  const showAllBtn = document.getElementById('show-all-btn');
  const capture = document.getElementById('capture');
  const captureTitle = document.getElementById('capture-title');
  const captureEmail = document.getElementById('capture-email');
  const captureSubmit = document.getElementById('capture-submit');

  let expanded = false;
  let pendingGuide = null;

  function renderGuides() {
    const items = expanded ? GUIDES : GUIDES.slice(0, INITIAL_COUNT);
    list.innerHTML = items.map((g, i) => `
      <a class="card guide-card" href="#" data-idx="${i}">
        <div class="guide-thumb"><div class="thumb-glyph">${g.thumb.replace(/\n/g,'<br>')}</div></div>
        <div class="guide-body">
          <div class="guide-title-row">
            <span class="guide-title">${g.title}</span>
            ${g.badge ? `<span class="badge-blue">${g.badge}</span>` : ''}
          </div>
          <p class="guide-desc">${g.desc}</p>
          <span class="guide-cta">Get the guide →</span>
        </div>
      </a>
    `).join('');

    list.querySelectorAll('.guide-card').forEach(el => {
      el.addEventListener('click', e => {
        e.preventDefault();
        const idx = parseInt(el.dataset.idx, 10);
        pendingGuide = GUIDES[idx];

        // If we already captured an email this session, skip the form —
        // log the download in the background and open the PDF straight away.
        const savedEmail = sessionStorage.getItem('karemops_email');
        if (savedEmail) {
          logSignup(savedEmail, pendingGuide);
          if (pendingGuide.href) {
            try { window.open(pendingGuide.href, '_blank'); } catch (e) { /* ignore */ }
          }
          return;
        }

        captureTitle.textContent = `"${pendingGuide.title}"`;
        capture.classList.add('open');
        capture.scrollIntoView({ behavior: 'smooth', block: 'center' });
        captureEmail.focus();
      });
    });

    showAllBtn.textContent = expanded
      ? 'Show fewer guides ↑'
      : `Show all ${GUIDES.length} guides →`;
  }

  showAllBtn.addEventListener('click', () => {
    expanded = !expanded;
    renderGuides();
  });

  // Paste your Apps Script Web App URL here after deploying (see site/SETUP.md)
  const SIGNUP_ENDPOINT = 'https://script.google.com/macros/s/AKfycbw9M9UDiKTJIpSuRoSkkPotHzVtlJcbShIA7a9o9EgzddgzvY_HKNmBXHPNKOh41VswuQ/exec';

  // Detect where the visitor came from — UTM wins, referrer is fallback, then 'direct'.
  // Result is cached for the whole session so every guide click reports the same source.
  function detectSource() {
    const cached = sessionStorage.getItem('karemops_source');
    if (cached) return cached;

    let source = '';
    try {
      const utm = new URLSearchParams(window.location.search).get('utm_source');
      if (utm) source = utm.toLowerCase().trim();
    } catch (e) { /* ignore */ }

    if (!source && document.referrer) {
      try {
        const host = new URL(document.referrer).hostname.toLowerCase();
        if      (host.includes('linkedin'))                    source = 'linkedin';
        else if (host.includes('instagram'))                   source = 'instagram';
        else if (host.includes('tiktok'))                      source = 'tiktok';
        else if (host.includes('twitter') || host.includes('x.com')) source = 'twitter';
        else if (host.includes('youtube') || host.includes('youtu.be')) source = 'youtube';
        else if (host.includes('facebook') || host.includes('fb.com'))  source = 'facebook';
        else if (host.includes('google'))                      source = 'google';
        else if (host.includes('skool'))                       source = 'skool';
        else if (host.includes('karemops'))                    source = 'internal';
        else                                                    source = host; // raw domain
      } catch (e) { /* ignore */ }
    }

    if (!source) source = 'direct';
    try { sessionStorage.setItem('karemops_source', source); } catch (e) { /* ignore */ }
    return source;
  }

  // Fires the webhook in the background — logs a download to the sheet
  // and triggers the guide email. Never blocks the UI.
  function logSignup(email, guide) {
    try {
      if (!SIGNUP_ENDPOINT || SIGNUP_ENDPOINT.startsWith('PASTE_')) return;
      const href = guide?.href || '';
      let guideUrl = href;
      try { guideUrl = new URL(href, window.location.href).href; } catch (e) { /* keep raw href */ }
      fetch(SIGNUP_ENDPOINT, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          email,
          guide: guide?.title || '',
          guideUrl,
          source: detectSource()
        })
      }).catch(() => { /* silent */ });
    } catch (e) { /* silent */ }
  }

  captureSubmit.addEventListener('click', () => {
    const email = captureEmail.value.trim();
    if (!email || !email.includes('@')) {
      captureEmail.focus();
      return;
    }

    captureSubmit.textContent = 'Sending…';
    captureSubmit.disabled = true;

    // Remember the email for the rest of this session so future guide
    // clicks skip the capture form.
    try { sessionStorage.setItem('karemops_email', email); } catch (e) { /* ignore */ }

    const guideHref = pendingGuide?.href || '';

    // Open the guide instantly (synchronously — avoids popup blockers).
    if (guideHref) {
      try { window.open(guideHref, '_blank'); } catch (e) { /* ignore */ }
    }

    logSignup(email, pendingGuide);

    captureSubmit.textContent = 'Sent ✓';
    setTimeout(() => {
      captureSubmit.textContent = 'Send it';
      captureSubmit.disabled = false;
      captureEmail.value = '';
      capture.classList.remove('open');
    }, 1200);
  });

  captureEmail.addEventListener('keydown', e => {
    if (e.key === 'Enter') captureSubmit.click();
  });

  renderGuides();
</script>

</body>
</html>
